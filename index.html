<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>일상 기록</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="일상 기록">
<meta name="theme-color" content="#DCE9E1">
<style>
/* ---- 테마: 기본 = 세이지 (저채도 그린) ---- */
:root{
  --bg:#DCE9E1; --card:#ffffff; --text:#333A36; --sub:#85928B;
  --accent:#7FA98E; --line:#E2EBE5; --chip:#EAF2ED; --field:#F4F8F6;
  --danger:#D99287; --star:#EDB868; --star-off:#DFE8E2;
  --btn-bg:#7FA98E; --btn-text:#ffffff;
  --shadow:0 3px 10px rgba(60,80,70,.08);
}
html[data-theme=lavender]{ --bg:#E4E1F0; --accent:#9189BB; --btn-bg:#9189BB;
  --line:#E7E4F2; --chip:#EEECF6; --field:#F7F6FB; --star-off:#E3E0EE;
  --shadow:0 3px 10px rgba(70,65,100,.08); }
html[data-theme=peach]{ --bg:#F2E3D6; --accent:#C09469; --btn-bg:#C09469;
  --line:#EFE4D8; --chip:#F7EEE4; --field:#FBF6F0; --star-off:#EEE2D4;
  --shadow:0 3px 10px rgba(110,85,60,.08); }
html[data-theme=sky]{ --bg:#DCE7EE; --accent:#7E9EB5; --btn-bg:#7E9EB5;
  --line:#E2EBF1; --chip:#EAF1F6; --field:#F4F8FB; --star-off:#DFE9EF;
  --shadow:0 3px 10px rgba(60,80,100,.08); }
html[data-theme=mono]{ --bg:#E9E7E4; --accent:#878D89; --btn-bg:#878D89;
  --line:#E8E6E3; --chip:#F0EFED; --field:#F8F7F6; --star-off:#E5E3E0;
  --shadow:0 3px 10px rgba(70,70,70,.07); }

/* 다크모드에서도 항상 파스텔 바탕 유지 (사용자 선택) */
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0; padding:0; overflow:hidden;
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  font-size:16px; -webkit-text-size-adjust:100%}
/* 고정 레이아웃: 페이지는 안 움직이고 main 내부만 스크롤 → iOS 키보드 밀림 방지 */
/* iOS 단독실행 한계(v22~v24 실측): 웹 렌더링은 뷰포트(innerHeight)까지만 합성되고
   그 아래 ~59pt 띠는 iOS가 body 배경색으로만 칠한다(웹에서는 못 그림).
   → body 배경 = 화면 배경색으로 두고, 그 바로 위에 풋터 문구를 놓아
   띠가 "풋터 아래 여백"처럼 자연스럽게 보이게 한다 */
html{height:100%; background:var(--bg)}
body{position:fixed; inset:0; display:flex; flex-direction:column;
  background:var(--bg)}
header{flex:none; background:var(--bg);
  padding:calc(12px + env(safe-area-inset-top)) 18px 10px;
  display:flex; align-items:center; justify-content:space-between}
.htitle{display:flex; align-items:center; gap:10px}
.htitle img{width:34px; height:34px; border-radius:10px; box-shadow:var(--shadow)}
header h1{font-size:20px; margin:0; font-weight:800}
header>button{background:var(--card); border:none; width:38px; height:38px;
  border-radius:50%; font-size:17px; color:var(--accent); box-shadow:var(--shadow)}
main{flex:1; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch;
  padding:2px 16px 28px; background:var(--bg)}
.card{background:var(--card); border-radius:20px; padding:16px; margin-bottom:12px;
  border:none; box-shadow:var(--shadow)}
.chips{display:flex; gap:7px; overflow-x:auto; padding:2px 0 12px; -webkit-overflow-scrolling:touch}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto; padding:8px 15px; border-radius:20px; background:var(--chip);
  border:none; font-size:14px; color:var(--text); white-space:nowrap}
.chip.on{background:var(--accent); color:var(--btn-text); font-weight:700}
label{display:block; font-size:13px; color:var(--sub); margin:11px 2px 5px; font-weight:600}
input[type=text],input[type=url],input[type=date],input[type=number],textarea,select{
  width:100%; padding:12px 13px; border-radius:13px; border:1.5px solid var(--line);
  background:var(--field); color:var(--text); font-size:16px; font-family:inherit;
  outline:none; -webkit-appearance:none; appearance:none}
/* iOS에서 날짜 입력칸이 줄어드는 것 방지 — 다른 입력칸과 같은 폭/높이 */
input[type=date]{display:block; min-height:48px; text-align:left}
input[type=date]::-webkit-date-and-time-value{text-align:left}
input:focus,textarea:focus{border-color:var(--accent)}
textarea{min-height:90px; resize:vertical}
.btn{display:block; width:100%; padding:13px; border-radius:15px; border:none;
  background:var(--btn-bg); color:var(--btn-text); font-size:16px; font-weight:700; margin-top:14px}
.btn.secondary{background:var(--chip); color:var(--text)}
.btn.danger{background:transparent; color:var(--danger); border:1.5px solid var(--line)}
.btn:active{opacity:.7}
.row2{display:flex; gap:10px}
.row2>div{flex:1}
.stars{display:flex; gap:2px; padding:8px 0 4px; min-width:0}
.stars button{background:none; border:none; font-size:24px; line-height:1.2;
  color:var(--star-off); padding:0 1px; flex:0 1 auto; min-width:0}
.stars button.on{color:var(--star)}
.rec-card{display:flex; gap:12px}
.rec-thumb{flex:0 0 92px}
.rec-thumb img{width:92px; height:64px; object-fit:cover; border-radius:11px}
.rec-body{flex:1; min-width:0}
.rec-kind{display:inline-block; font-size:11px; color:var(--accent); font-weight:700;
  background:var(--chip); padding:3px 10px; border-radius:9px; margin-bottom:3px}
.rec-title{font-weight:700; margin:2px 0; word-break:break-all}
.rec-star{color:var(--star); font-size:14px}
.rec-sub{font-size:13px; color:var(--sub); margin:2px 0}
.rec-memo{font-size:14px; margin:7px 0 0; white-space:pre-wrap; word-break:break-all;
  background:var(--field); border-radius:11px; padding:9px 11px}
.rec-actions{display:flex; gap:16px; margin-top:9px; font-size:14px}
.rec-actions a,.rec-actions button{color:var(--accent); background:none; border:none;
  font-size:14px; font-weight:600; padding:0; text-decoration:none}
.rec-actions button.del{color:var(--danger)}
.empty{text-align:center; color:var(--sub); padding:36px 0; font-size:15px; line-height:1.7}
.caption{font-size:13px; color:var(--sub); margin:7px 4px 12px; line-height:1.5}
.diary-item{margin-bottom:10px}
.diary-item summary{font-weight:700; padding:13px 16px; background:var(--card);
  border:none; border-radius:16px; list-style:none; box-shadow:var(--shadow)}
.diary-item summary::-webkit-details-marker{display:none}
.diary-item[open] summary{border-radius:16px 16px 0 0}
.diary-item .diary-body{background:var(--card); border-top:1.5px dashed var(--line);
  border-radius:0 0 16px 16px; padding:13px 16px; white-space:pre-wrap; font-size:15px;
  box-shadow:var(--shadow)}
/* 플로팅 알약 탭바 + 풋터: 풋터 아래의 못 그리는 띠(--dead)는 배경색으로 칠해져
   풋터의 여백처럼 보인다. safe area에서 띠 높이만큼 빼서 이중 여백 방지 */
nav{flex:none; display:flex; gap:4px; background:var(--card);
  border-radius:999px; border:1px solid var(--line);
  box-shadow:0 4px 14px rgba(47,90,70,.14);
  margin:8px 16px 0;
  padding:6px 8px; z-index:20}
nav button{flex:1; background:none; border:none; padding:7px 0 5px; color:var(--sub);
  font-size:11px; font-weight:600; display:flex; flex-direction:column; align-items:center;
  gap:2px; border-radius:999px}
nav button svg{width:23px; height:23px}
nav button.on{color:var(--accent); background:var(--chip)}
/* 탭바 아래 풋터: 데드존 띠 바로 위에 앉는 한 줄 */
footer{flex:none; text-align:center; font-size:11px; font-weight:600; color:var(--sub);
  letter-spacing:.03em;
  padding:7px 0 calc(7px + max(0px, env(safe-area-inset-bottom) - var(--dead, 0px)))}
/* 키보드가 올라오면 하단 탭바 숨김 (iOS에서 키보드 위로 떠오르는 문제) */
body.kb nav,body.kb footer{display:none}
.themes{display:flex; gap:12px; padding:6px 2px 2px}
.theme-dot{width:40px; height:40px; border-radius:50%; border:3px solid transparent; padding:0}
.theme-dot.on{border-color:var(--text)}
.photo-row{display:flex; flex-wrap:wrap; gap:10px; padding:4px 0}
.photo-row .ph{position:relative}
.photo-row img{width:72px; height:72px; object-fit:cover; border-radius:11px; display:block;
  background:var(--field)}
.photo-row .ph button{position:absolute; top:-7px; right:-7px; width:22px; height:22px;
  border-radius:50%; border:none; background:var(--text); color:var(--card);
  font-size:12px; line-height:1; padding:0}
.btn.small{padding:10px; font-size:14px; margin-top:8px}
.rec-photos{display:flex; flex-wrap:wrap; gap:6px; margin-top:7px}
.rec-photos img{width:74px; height:74px; object-fit:cover; border-radius:10px; background:var(--field)}
.lightbox{position:fixed; inset:0; background:rgba(0,0,0,.88); display:none;
  align-items:center; justify-content:center; z-index:60}
.lightbox.show{display:flex}
.lightbox img{max-width:94vw; max-height:88vh; border-radius:14px}
.sheet-bg{position:fixed; inset:0; background:rgba(20,40,30,.45); z-index:30; display:none}
.sheet-bg.show{display:block}
.sheet{position:fixed; left:0; right:0; bottom:0; background:var(--card); z-index:31;
  border-radius:22px 22px 0 0;
  padding:20px 18px calc(20px + max(0px, env(safe-area-inset-bottom) - var(--dead, 0px)));
  transform:translateY(100%); transition:transform .25s; max-height:80vh; overflow-y:auto}
.sheet.show{transform:translateY(0)}
.sheet h2{margin:0 0 4px; font-size:18px}
h3{font-size:17px; margin:20px 4px 10px; font-weight:800}
section{display:none}
section.on{display:block}
.toast{position:fixed; left:50%; bottom:calc(92px + env(safe-area-inset-bottom));
  transform:translateX(-50%) translateY(8px); background:var(--text); color:var(--card);
  padding:11px 20px; border-radius:22px; font-size:14px; font-weight:600;
  opacity:0; transition:.25s; z-index:50; pointer-events:none; white-space:nowrap}
.toast.show{opacity:1; transform:translateX(-50%)}
</style>
</head>
<body>

<header>
  <div class="htitle">
    <img src="icon-192.png" alt="">
    <h1 id="page-title">기록</h1>
  </div>
  <button id="data-btn" aria-label="데이터 관리">⚙︎</button>
</header>

<main>
  <!-- ===================== 기록 ===================== -->
  <section id="sec-records" class="on">
    <div class="card">
      <div class="chips" id="kind-chips"></div>

      <div id="f-url-wrap">
        <label id="f-url-label">YouTube URL</label>
        <input type="url" id="f-url" placeholder="https://youtu.be/..." inputmode="url">
        <div class="caption" id="f-url-hint"></div>
      </div>

      <label id="f-title-label" data-i18n="lbl_title">제목</label>
      <input type="text" id="f-title" placeholder="제목">

      <div id="f-creator-wrap">
        <label id="f-creator-label">만든이</label>
        <input type="text" id="f-creator" placeholder="">
      </div>

      <div id="f-ep-wrap" style="display:none">
        <label data-i18n="lbl_ep">회차</label>
        <input type="number" id="f-ep" min="1" max="999" value="1" inputmode="numeric">
      </div>

      <div class="row2">
        <div>
          <label data-i18n="lbl_date">날짜</label>
          <input type="date" id="f-date">
        </div>
        <div>
          <label data-i18n="lbl_rating">별점</label>
          <div class="stars" id="f-stars"></div>
        </div>
      </div>

      <label data-i18n="lbl_memo">감상 / 메모</label>
      <textarea id="f-memo" data-i18n-ph="ph_memo" placeholder="뭐가 재밌었고 뭐가 감명깊었는지"></textarea>

      <label data-i18n="lbl_photos">사진 (선택)</label>
      <div class="photo-row" id="f-photos"></div>
      <button class="btn secondary small" id="f-photo-btn" data-i18n="btn_add_photo">사진 추가</button>
      <input type="file" id="f-photo-input" accept="image/*" multiple style="display:none">

      <button class="btn" id="f-save" data-i18n="btn_save">저장</button>
      <button class="btn secondary small" id="f-cancel-edit" style="display:none" data-i18n="btn_cancel_edit">수정 취소</button>
    </div>

    <h3 data-i18n="h_records">저장된 기록</h3>
    <div class="chips" id="filter-chips"></div>
    <div id="record-list"></div>
  </section>

  <!-- ===================== 일기 ===================== -->
  <section id="sec-diary">
    <div class="card">
      <label data-i18n="lbl_date">날짜</label>
      <input type="date" id="d-date">
      <label data-i18n="lbl_today">오늘 하루</label>
      <textarea id="d-content" style="min-height:160px" data-i18n-ph="ph_diary"
        placeholder="오늘 뭐 했고, 뭐가 좋았고, 뭐가 아쉬웠는지..."></textarea>
      <label data-i18n="lbl_photos">사진 (선택)</label>
      <div class="photo-row" id="d-photos"></div>
      <button class="btn secondary small" id="d-photo-btn" data-i18n="btn_add_photo">사진 추가</button>
      <input type="file" id="d-photo-input" accept="image/*" multiple style="display:none">
      <button class="btn" id="d-save" data-i18n="btn_save">저장</button>
      <button class="btn danger" id="d-del" style="display:none" data-i18n="btn_del_diary">이 날짜 일기 삭제</button>
    </div>
    <h3 data-i18n="h_past_diary">지난 일기</h3>
    <div id="diary-list"></div>
  </section>

  <!-- ===================== 교환일기 (이스터 에그) ===================== -->
  <section id="sec-exchange">
    <div class="card">
      <div class="caption" style="margin:0 4px 8px" data-i18n="x_caption">🤫 비밀의 교환일기장이에요. 일기를 쓰고 에어드랍으로 주고받아 보세요.</div>
      <label data-i18n="lbl_my_name">내 이름</label>
      <input type="text" id="x-author" maxlength="12" data-i18n-ph="ph_my_name" placeholder="예: 거북이">
      <label data-i18n="lbl_date">날짜</label>
      <input type="date" id="x-date">
      <label data-i18n="lbl_x_content">오늘의 교환일기</label>
      <textarea id="x-content" style="min-height:140px" data-i18n-ph="ph_x_content"
        placeholder="친구에게 들려주고 싶은 오늘 이야기"></textarea>
      <label data-i18n="lbl_photos">사진 (선택)</label>
      <div class="photo-row" id="x-photos"></div>
      <button class="btn secondary small" id="x-photo-btn" data-i18n="btn_add_photo">사진 추가</button>
      <input type="file" id="x-photo-input" accept="image/*" multiple style="display:none">
      <button class="btn" id="x-save" data-i18n="btn_save">저장</button>
      <button class="btn secondary small" id="x-share" data-i18n="btn_x_share">📡 에어드랍으로 보내기</button>
      <button class="btn secondary small" id="x-import" data-i18n="btn_x_import">받은 교환일기 가져오기</button>
      <input type="file" id="x-file" accept=".json,application/json" style="display:none">
    </div>
    <h3 data-i18n="h_x_list">주고받은 일기</h3>
    <div id="x-list"></div>
  </section>

  <!-- ===================== 검색 ===================== -->
  <section id="sec-search">
    <div class="card">
      <input type="text" id="s-q" data-i18n-ph="ph_search" placeholder="지난주에 본 거 / 별 5개짜리 영화 / 어제 일기"
        autocomplete="off">
      <button class="btn" id="s-go" data-i18n="btn_search">검색</button>
    </div>
    <div class="caption" id="s-explain"></div>
    <div id="s-results"></div>
  </section>
</main>

<nav>
  <button data-tab="records" class="on">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
    <span data-i18n="nav_records">기록</span>
  </button>
  <button data-tab="diary">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4h6a4 4 0 0 1 4 4v12a3 3 0 0 0-3-3H2z"/><path d="M22 4h-6a4 4 0 0 0-4 4v12a3 3 0 0 1 3-3h7z"/></svg>
    <span data-i18n="nav_diary">일기</span>
  </button>
  <button data-tab="search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <span data-i18n="nav_search">검색</span>
  </button>
  <!-- 이스터 에그: 풋터를 3번 연속 탭할 때마다 열림/숨김 토글 -->
  <button data-tab="exchange" id="tab-exchange" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="m2 7 10 7L22 7"/></svg>
    <span data-i18n="nav_exchange">교환</span>
  </button>
</nav>

<footer id="app-footer">🐢 오늘도 차곡차곡</footer>

<!-- 데이터 관리 시트 -->
<div class="sheet-bg" id="sheet-bg"></div>
<div class="sheet" id="data-sheet">
  <h2 data-i18n="h_settings">설정</h2>
  <div class="caption" style="margin-bottom:2px" data-i18n="lbl_theme">테마 색</div>
  <div class="themes" id="theme-row"></div>
  <div class="caption" style="margin:16px 4px 2px" data-i18n="lbl_lang">언어</div>
  <div class="chips" id="lang-row"></div>
  <div class="caption" style="margin:16px 4px 2px" data-i18n="lbl_footer">하단 문구</div>
  <input type="text" id="foot-input" maxlength="40" autocomplete="off"
    placeholder="🐢 오늘도 차곡차곡">
  <div class="caption" style="margin-top:6px" data-i18n="footer_hint">탭바 아래에 보이는 문구예요. 이모지도 돼요. 비워두면 표시되지 않아요.</div>
  <h2 style="margin-top:18px" data-i18n="h_data">데이터 관리</h2>
  <div class="caption" id="data-stats"></div>
  <button class="btn" id="exp-btn" data-i18n="btn_export">내보내기 (JSON 백업)</button>
  <button class="btn secondary" id="imp-btn" data-i18n="btn_import">가져오기 (JSON)</button>
  <input type="file" id="imp-file" accept=".json,application/json" style="display:none">
  <div class="caption" style="margin-top:14px" data-i18n="data_note">
    모든 데이터는 이 아이폰 안에만 저장돼요. 폰을 바꾸거나 앱을 지우면 사라지니
    가끔 "내보내기"로 백업해 두세요. 맥 앱의 기록도 JSON으로 가져올 수 있어요.
  </div>
  <div class="caption" style="text-align:center">앱 버전 v32</div>
</div>

<div class="lightbox" id="lightbox"><img alt=""></div>

<script>
"use strict";
/* ===================== 저장소 ===================== */
const LS_KEY = "dailylog_v1";

function load(){
  try{
    const d = JSON.parse(localStorage.getItem(LS_KEY));
    if(d && Array.isArray(d.records) && typeof d.diary === "object"){
      if(!Array.isArray(d.exchange)) d.exchange = [];
      return d;
    }
  }catch(e){}
  return {records:[], diary:{}, exchange:[]};

const LANG_KEY = "dailylog_lang";
const LANG_NAMES = {ko:"한국어", en:"English", ja:"日本語", zh:"中文"};
let LANG = localStorage.getItem(LANG_KEY) || "ko";
if(!L10N[LANG]) LANG = "ko";
function T(key){
  const v = L10N[LANG][key];
  return v !== undefined ? v : (L10N.ko[key] !== undefined ? L10N.ko[key] : key);
}
function TF(key, vars){
  let s = T(key);
  for(const [k, v] of Object.entries(vars || {})) s = s.replace("{" + k + "}", v);
  return s;
}
function kindLabel(k){
  const v = L10N[LANG]["kind_" + k] || L10N.ko["kind_" + k];
  return v || k;
}
function applyLang(){
  document.documentElement.lang = LANG === "zh" ? "zh-CN" : LANG;
  document.querySelectorAll("[data-i18n]").forEach(el => { el.innerHTML = T(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-ph]").forEach(el => { el.placeholder = T(el.dataset.i18nPh); });
  document.getElementById("foot-input").placeholder = T("footer_default");
  applyFooter();
  renderKindChips(); applyKindForm(); setEditMode(!!editingId);
  renderFilterChips(); renderRecordList();
  renderDiaryList(); renderExchangeList();
  renderThemeRow(); renderLangRow(); updateStats();
  const onBtn = document.querySelector("nav button.on");
  if(onBtn) document.getElementById("page-title").textContent = T("title_" + onBtn.dataset.tab);
}
function renderLangRow(){
  const row = document.getElementById("lang-row");
  row.innerHTML = "";
  for(const [code, name] of Object.entries(LANG_NAMES)){
    const b = document.createElement("button");
    b.className = "chip" + (code === LANG ? " on" : "");
    b.textContent = name;
    b.addEventListener("click", () => {
      LANG = code;
      localStorage.setItem(LANG_KEY, code);
      applyLang();
    });
    row.appendChild(b);
  }
}

/* ===================== NL-PARSER-START ===================== */
function _fmt(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function _addDays(d, n){ const x = new Date(d); x.setDate(x.getDate()+n); return x; }
function _weekRange(base, weeksAgo){
  const dow = (base.getDay()+6)%7; // 월=0
  const mon = _addDays(base, -dow - 7*weeksAgo);
  return [mon, _addDays(mon, 6)];
}
function _monthRange(y, m){ // m: 1~12
  const first = new Date(y, m-1, 1);
  const last = new Date(y, m, 0);
  return [first, last];
}
function _prevMonth(y, m, back){
  let mm = m - back, yy = y;
  while(mm < 1){ mm += 12; yy -= 1; }
  return [yy, mm];
}

function parseQuery(q, today){
  today = today || new Date();
  let text = (q||"").trim();
  let start = null, end = null, kind = null, rating = null;
  const explain = [];

  // 한국어·영어·일본어·중국어 표현을 모두 인식 (UI 언어와 무관하게 전부 활성)
  const _yesterday = () => [_addDays(today,-1), _addDays(today,-1)];
  const _dby = () => [_addDays(today,-2), _addDays(today,-2)];
  const _thisWeek = () => [_weekRange(today,0)[0], today];
  const _lastMonth = back => { const [y,m]=_prevMonth(today.getFullYear(),today.getMonth()+1,back); return _monthRange(y,m); };
  const _thisMonth = () => [new Date(today.getFullYear(), today.getMonth(), 1), today];
  const _thisYear = () => [new Date(today.getFullYear(),0,1), today];
  const _lastYear = () => [new Date(today.getFullYear()-1,0,1), new Date(today.getFullYear()-1,11,31)];
  const datePatterns = [
    [/그저께|그제/, _dby],
    [/어제/, _yesterday],
    [/오늘/, () => [today, today]],
    [/지지난\s*주/, () => _weekRange(today, 2)],
    [/(지난|저번)\s*주/, () => _weekRange(today, 1)],
    [/이번\s*주/, _thisWeek],
    [/지지난\s*달/, () => _lastMonth(2)],
    [/(지난|저번)\s*달/, () => _lastMonth(1)],
    [/이번\s*달/, _thisMonth],
    [/올해/, _thisYear],
    [/작년/, _lastYear],
    [/최근\s*(\d+)\s*일/, m => [_addDays(today,-+m[1]), today]],
    [/최근\s*(\d+)\s*주/, m => [_addDays(today,-7*+m[1]), today]],
    [/최근\s*(\d+)\s*(?:달|개월)/, m => [_addDays(today,-30*+m[1]), today]],
    [/(\d+)\s*일\s*전/, m => [_addDays(today,-+m[1]), _addDays(today,-+m[1])]],
    [/(\d+)\s*주\s*전/, m => _weekRange(today, +m[1])],
    [/(\d{4})\s*년\s*(\d{1,2})\s*월/, m => _monthRange(+m[1], +m[2])],
    [/(\d{4})\s*년/, m => [new Date(+m[1],0,1), new Date(+m[1],11,31)]],
    // English
    [/day\s*before\s*yesterday/i, _dby],
    [/yesterday/i, _yesterday],
    [/today/i, () => [today, today]],
    [/last\s*week/i, () => _weekRange(today, 1)],
    [/this\s*week/i, _thisWeek],
    [/last\s*month/i, () => _lastMonth(1)],
    [/this\s*month/i, _thisMonth],
    [/this\s*year/i, _thisYear],
    [/last\s*year/i, _lastYear],
    [/(?:past|last|recent)\s*(\d+)\s*days?/i, m => [_addDays(today,-+m[1]), today]],
    [/(?:past|last|recent)\s*(\d+)\s*weeks?/i, m => [_addDays(today,-7*+m[1]), today]],
    [/(?:past|last|recent)\s*(\d+)\s*months?/i, m => [_addDays(today,-30*+m[1]), today]],
    [/(\d+)\s*days?\s*ago/i, m => [_addDays(today,-+m[1]), _addDays(today,-+m[1])]],
    [/(\d+)\s*weeks?\s*ago/i, m => _weekRange(today, +m[1])],
    // 日本語
    [/一昨日|おととい/, _dby],
    [/昨日|きのう/, _yesterday],
    [/今日|きょう/, () => [today, today]],
    [/先々週/, () => _weekRange(today, 2)],
    [/先週/, () => _weekRange(today, 1)],
    [/今週/, _thisWeek],
    [/先々月/, () => _lastMonth(2)],
    [/先月/, () => _lastMonth(1)],
    [/今月/, _thisMonth],
    [/最近(\d+)日/, m => [_addDays(today,-+m[1]), today]],
    [/(\d+)日前/, m => [_addDays(today,-+m[1]), _addDays(today,-+m[1])]],
    // 中文
    [/前天/, _dby],
    [/昨天/, _yesterday],
    [/今天/, () => [today, today]],
    [/上上[周週]/, () => _weekRange(today, 2)],
    [/上[周週]|上个星期|上個星期/, () => _weekRange(today, 1)],
    [/[这這本][周週]/, _thisWeek],
    [/上上个月|上上個月/, () => _lastMonth(2)],
    [/上个月|上個月/, () => _lastMonth(1)],
    [/[这這]个月|[这這]個月|本月/, _thisMonth],
    [/最近(\d+)天/, m => [_addDays(today,-+m[1]), today]],
    [/(\d+)天前/, m => [_addDays(today,-+m[1]), _addDays(today,-+m[1])]],
    // 日中 공통 한자
    [/今年/, _thisYear],
    [/去年|昨年/, _lastYear],
    [/(\d{4})年(\d{1,2})月/, m => _monthRange(+m[1], +m[2])],
    [/(\d{4})年/, m => [new Date(+m[1],0,1), new Date(+m[1],11,31)]],
    // "N월"은 마지막에 (다른 패턴과 충돌 방지)
    [/(\d{1,2})\s*[월月](?!\s*\d)/, m => {
      const mo = +m[1];
      if(mo < 1 || mo > 12) return null;
      const y = mo <= today.getMonth()+1 ? today.getFullYear() : today.getFullYear()-1;
      return _monthRange(y, mo);
    }],
  ];
  for(const [re, fn] of datePatterns){
    const m = text.match(re);
    if(m){
      const range = fn(m);
      if(!range) continue;
      [start, end] = range;
      text = text.slice(0, m.index) + " " + text.slice(m.index + m[0].length);
      explain.push(TF("s_period", {a:_fmt(start), b:_fmt(end)}));
      break;
    }
  }

  const ratingPatterns = [
    /별점?\s*(\d)\s*개?(?:짜리)?/, /(\d)\s*점(?:짜리)?(?:\s*이상)?/,
    /(\d)\s*[-\s]?stars?(?:\s*(?:or\s*more|and\s*up))?/i,
    /星(\d)(?:以上)?/, /(\d)\s*つ星/, /(\d)星(?:以上)?/,
  ];
  for(const re of ratingPatterns){
    const m = text.match(re);
    if(m){
      const r = +m[1];
      if(r >= 1 && r <= 5){
        rating = r;
        text = text.slice(0, m.index) + " " + text.slice(m.index + m[0].length);
        explain.push(TF("s_rating", {n:r}));
        break;
      }
    }
  }

  const kindPatterns = [
    [/유튜브|유투브|youtube|영상|videos?|動画|视频|視頻/i, "youtube"],
    [/드라마|dramas?|ドラマ|电视剧|電視劇/i, "drama"],
    [/영화|movies?|films?|映画|电影|電影/i, "movie"],
    [/논문|papers?|thesis|論文|论文/i, "paper"],
    [/책|독서|books?|読書|(?<!日)本|书|書籍/i, "book"],
    [/일기|diary|diaries|journal|日記|日记/i, "diary"],
  ];
  for(const [re, k] of kindPatterns){
    const m = text.match(re);
    if(m){
      kind = k;
      text = text.slice(0, m.index) + " " + text.slice(m.index + m[0].length);
      explain.push(TF("s_only", {k:kindLabel(k)}));
      break;
    }
  }

  const STOPWORDS = new Set(["본","봤던","봤지","봤어","봤나","봤는지","봤더라","보던","보고","본거",
    "뭐","뭘","뭐였지","뭐였더라","뭐지","뭐있지","무엇","무슨","어떤",
    "언제","거","것","게","건","좀","내가","나","제가",
    "알려줘","찾아줘","보여줘","검색","기록","목록","있었지","있지",
    "했던","했지","어땠지","어땠더라","다시","그","중에","중",
    "읽은","읽었던","읽었지","읽다가","들었던","쓴","썼던","적은",
    "재밌게","재미있게","감명깊었던","감명","좋았던","인상깊었던",
    // English
    "the","a","an","i","my","me","of","in","on","at","that","this","was","were","is","are","did","do",
    "what","which","when","watched","watch","saw","seen","read","show","find","search","list",
    // 日本語 / 中文
    "見た","みた","観た","読んだ","聞いた","何","いつ","もの","こと",
    "看的","看过","看了","读过","什么","哪个"]);
  const PARTICLES = ["이랑","에서","부터","까지","으로","은","는","이","가","을","를","에","도","만","의","랑","와","과","로"];

  text = text.replace(/[?!.,~·…"'`？！。、]+/g, " ");
  const keywords = [];
  for(let tok of text.split(/\s+/)){
    if(!tok) continue;
    if(PARTICLES.includes(tok)) continue;
    for(const p of PARTICLES.slice().sort((a,b)=>b.length-a.length)){
      if(tok.endsWith(p) && tok.length > p.length + 1){ tok = tok.slice(0, -p.length); break; }
    }
    if(!tok || STOPWORDS.has(tok) || STOPWORDS.has(tok.toLowerCase())) continue;
    keywords.push(tok);
  }
  if(keywords.length) explain.push(T("s_kw") + keywords.join(", "));

  return {start: start ? _fmt(start) : null, end: end ? _fmt(end) : null, kind, rating, keywords, explain};
}
/* ===================== NL-PARSER-END ===================== */

/* ===================== 검색 ===================== */
function searchRecords(p){
  return DB.records.filter(r => {
    if(p.kind && r.kind !== p.kind) return false;
    if(p.rating && !(r.rating >= p.rating)) return false;
    if(p.start && r.date < p.start) return false;
    if(p.end && r.date > p.end) return false;
    for(const kw of p.keywords){
      const hay = [r.title, r.creator, r.memo, r.detail, r.url].map(x => x||"").join(" ").toLowerCase();
      if(!hay.includes(kw.toLowerCase())) return false;
    }
    return true;
  }).sort((a,b) => b.date.localeCompare(a.date) || b.createdAt - a.createdAt);
}
function searchDiaries(p){
  return Object.entries(DB.diary).filter(([date, d]) => {
    if(p.start && date < p.start) return false;
    if(p.end && date > p.end) return false;
    for(const kw of p.keywords){
      if(!d.content.toLowerCase().includes(kw.toLowerCase())) return false;
    }
    return true;
  }).sort((a,b) => b[0].localeCompare(a[0]));
}

function ytVideoId(url){
  const m = (url||"").match(/(?:youtu\.be\/|v=|shorts\/|embed\/|live\/)([\w-]{11})/);
  return m ? m[1] : null;
}
function ytThumb(url){
  const id = ytVideoId(url);
  return id ? `https://img.youtube.com/vi/${id}/hqdefault.jpg` : null;
}
async function tryFetchYtTitle(url){
  try{
    const r = await fetch(`https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`, {signal: AbortSignal.timeout(6000)});
    if(!r.ok) return null;
    const j = await r.json();
    return {title: j.title || "", channel: j.author_name || ""};
  }catch(e){ return null; }
}

/* ===================== 일반 URL 대표 이미지(og:image) ===================== */
/* 다른 사이트의 메타 태그는 CORS 때문에 직접 못 읽으므로 공개 프록시를 거친다.
   하나가 막히거나 죽어 있을 수 있어 두 곳을 차례로 시도 */
const META_PROXIES = [
  u => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
  u => "https://corsproxy.io/?url=" + encodeURIComponent(u),
];
async function _fetchViaProxies(url){
  for(const make of META_PROXIES){
    try{
      const r = await fetch(make(url), {signal: AbortSignal.timeout(9000)});
      if(r.ok) return await r.text();
    }catch(e){}
  }
  return null;
}
async function tryFetchPageMeta(url){
  try{
    const html = await _fetchViaProxies(url);
    if(!html) return null;
    const doc = new DOMParser().parseFromString(html, "text/html");
    const pick = sel => {
      const el = doc.querySelector(sel);
      return el ? (el.getAttribute("content") || "").trim() : "";
    };
    let thumb = pick('meta[property="og:image"]') || pick('meta[name="og:image"]')
      || pick('meta[name="twitter:image"]') || pick('meta[property="twitter:image"]');
    if(thumb){
      thumb = new URL(thumb, url).href;            // 상대 경로 보정
      thumb = thumb.replace(/^http:\/\//, "https://"); // 혼합 콘텐츠 차단 회피
    }
    const title = pick('meta[property="og:title"]')
      || (doc.querySelector("title") ? doc.querySelector("title").textContent.trim() : "");
    return {thumb: thumb || null, title: title || null};
  }catch(e){ return null; }
}
/* 이미지가 실제로 로드되는지 확인 — 안 뜨는 주소는 썸네일로 안 쓴다 */
function _imgLoads(src){
  return new Promise(res => {
    const im = new Image();
    const t = setTimeout(() => res(false), 8000);
    im.onload = () => { clearTimeout(t); res(im.naturalWidth > 1); };
    im.onerror = () => { clearTimeout(t); res(false); };
    im.src = src;
  });
}

/* ===================== iOS 죽은 영역(--dead) 측정 ===================== */
/* 단독실행 iOS에서 화면(screen 높이)보다 뷰포트(innerHeight)가 짧으면 그 차이.
   이 띠는 웹이 못 그리는 영역(body 배경색으로만 칠해짐)이라, 탭바/시트의
   safe-area 여백에서 이 값을 빼서 이중 여백을 막는다.
   콜드 스타트 직후 뷰포트 값이 늦게 잡히는 버그 대비, 크기 변화 때마다 재측정 */
function _setDead(){
  let dead = 0;
  if(navigator.standalone && screen){
    // iOS의 screen.width/height는 회전과 무관하게 세로 기준 고정값
    const land = matchMedia("(orientation: landscape)").matches;
    const sh = land ? Math.min(screen.width, screen.height) : Math.max(screen.width, screen.height);
    dead = Math.max(0, Math.min(100, sh - window.innerHeight));
  }
  document.documentElement.style.setProperty("--dead", dead + "px");
}
_setDead();
window.addEventListener("orientationchange", () => setTimeout(_setDead, 300));
window.addEventListener("pageshow", () => setTimeout(_setDead, 100));

/* ===================== 키보드 ↔ 하단 탭바 ===================== */
/* 키보드가 화면을 줄이면(visualViewport) 탭바를 숨김 — 포커스 이벤트보다 확실함 */
const _vv = window.visualViewport;
function _kbOpen(){
  return _vv ? (_vv.height < window.innerHeight - 120) : false;
}
let _scrollBefore = null;   // 키보드 열리기 전 main 스크롤 위치
function _mainEl(){ return document.querySelector("main"); }
function _restorePan(){
  // iOS가 키보드 때문에 화면을 밀어올린 걸 원위치
  if(window.scrollY !== 0) window.scrollTo(0, 0);
  document.documentElement.scrollTop = 0;
}
function _kbClosed(){
  document.body.classList.remove("kb");
  _restorePan();
  if(_scrollBefore !== null){
    _mainEl().scrollTop = _scrollBefore;   // 입력 전 위치로 복귀
    _scrollBefore = null;
  }
}
if(_vv){
  _vv.addEventListener("resize", () => {
    const open = _kbOpen();
    document.body.classList.toggle("kb", open);
    if(!open) setTimeout(_kbClosed, 60);
  });
}
// 문서 자체는 스크롤될 일이 없으므로, 키보드가 닫혀 있는데 밀려 있으면 즉시 복원
window.addEventListener("scroll", () => { if(!_kbOpen()) _restorePan(); });
document.addEventListener("focusin", e => {
  if(e.target.matches("input, textarea, select")){
    if(!document.body.classList.contains("kb")) _scrollBefore = _mainEl().scrollTop;
    document.body.classList.add("kb");
  }
});
document.addEventListener("focusout", () => {
  setTimeout(() => {
    if(_kbOpen()) return;
    if(!document.activeElement || !document.activeElement.matches("input, textarea, select"))
      _kbClosed();
  }, 80);
});

let toastTimer = null;
function toast(msg){
  let el = document.getElementById("toast");
  if(!el){
    el = document.createElement("div");
    el.id = "toast"; el.className = "toast";
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 1800);
}

/* ===================== 사진 (IndexedDB 저장) ===================== */
let _idb = null;
function imgDB(){
  return new Promise((res, rej) => {
    if(_idb) return res(_idb);
    const req = indexedDB.open("dailylog-img", 1);
    req.onupgradeneeded = () => req.result.createObjectStore("imgs");
    req.onsuccess = () => { _idb = req.result; res(_idb); };
    req.onerror = () => rej(req.error);
  });
}
async function imgPut(id, blob){
  const db = await imgDB();
  return new Promise((res, rej) => {
    const tx = db.transaction("imgs", "readwrite");
    tx.objectStore("imgs").put(blob, id);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
}
async function imgGet(id){
  const db = await imgDB();
  return new Promise(res => {
    const rq = db.transaction("imgs").objectStore("imgs").get(id);
    rq.onsuccess = () => res(rq.result || null);
    rq.onerror = () => res(null);
  });
}
async function imgDel(ids){
  if(!ids || !ids.length) return;
  const db = await imgDB();
  const tx = db.transaction("imgs", "readwrite");
  ids.forEach(i => tx.objectStore("imgs").delete(i));
}
async function imgClear(){
  const db = await imgDB();
  return new Promise(res => {
    const tx = db.transaction("imgs", "readwrite");
    tx.objectStore("imgs").clear();
    tx.oncomplete = res;
  });
}
function newImgId(){ return "p" + Date.now() + Math.random().toString(36).slice(2, 7); }

function fileToResizedBlob(file, maxDim = 1280, q = 0.8){
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => {
      let w = img.naturalWidth, h = img.naturalHeight;
      if(Math.max(w, h) > maxDim){
        const s = maxDim / Math.max(w, h);
        w = Math.round(w * s); h = Math.round(h * s);
      }
      const c = document.createElement("canvas");
      c.width = w; c.height = h;
      c.getContext("2d").drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(img.src);
      c.toBlob(b => b ? res(b) : rej(new Error("이미지 변환 실패")), "image/jpeg", q);
    };
    img.onerror = () => { URL.revokeObjectURL(img.src); rej(new Error("이미지 열기 실패")); };
    img.src = URL.createObjectURL(file);
  });
}
function blobToDataURL(blob){
  return new Promise(res => {
    const fr = new FileReader();
    fr.onload = () => res(fr.result);
    fr.readAsDataURL(blob);
  });
}
function dataURLToBlob(durl){
  const [head, b64] = durl.split(",");
  const mime = (head.match(/data:(.*?);/) || [,"image/jpeg"])[1];
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for(let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], {type: mime});
}

const _imgURLs = new Map();
async function imgURL(id){
  if(_imgURLs.has(id)) return _imgURLs.get(id);
  const b = await imgGet(id);
  if(!b) return null;
  const u = URL.createObjectURL(b);
  _imgURLs.set(id, u);
  return u;
}
async function hydratePhotos(root){
  for(const im of root.querySelectorAll("img[data-pid]:not([src])")){
    const u = await imgURL(im.dataset.pid);
    if(u) im.src = u;
  }
}

/* 폼 사진 선택 위젯 (기록·일기 공용) */
function photoPicker(listId, btnId, inputId){
  const state = []; // {id} = 저장된 사진, {blob, url} = 새로 고른 사진
  const listEl = document.getElementById(listId);
  document.getElementById(btnId).addEventListener("click", () =>
    document.getElementById(inputId).click());
  document.getElementById(inputId).addEventListener("change", async e => {
    for(const f of e.target.files){
      try{
        const blob = await fileToResizedBlob(f);
        state.push({blob, url: URL.createObjectURL(blob)});
      }catch(err){ toast(T("toast_photo_fail")); }
    }
    e.target.value = "";
    render();
  });
  function render(){
    listEl.innerHTML = "";
    state.forEach((p, i) => {
      const d = document.createElement("div"); d.className = "ph";
      const im = document.createElement("img");
      if(p.url) im.src = p.url;
      else if(p.id) im.dataset.pid = p.id;
      const x = document.createElement("button"); x.textContent = "✕";
      x.addEventListener("click", () => { state.splice(i, 1); render(); });
      d.appendChild(im); d.appendChild(x); listEl.appendChild(d);
    });
    hydratePhotos(listEl);
  }
  return {
    reset(ids){ state.length = 0; (ids || []).forEach(id => state.push({id})); render(); },
    currentIds(){ return state.filter(p => p.id).map(p => p.id); },
    async commit(){
      const ids = [];
      for(const p of state){
        if(p.id) ids.push(p.id);
        else { const id = newImgId(); await imgPut(id, p.blob); ids.push(id); }
      }
      return ids;
    }
  };
}

let editingId = null;
function setEditMode(on){
  document.getElementById("f-save").textContent = on ? T("btn_save_edit") : T("btn_save");
  document.getElementById("f-cancel-edit").style.display = on ? "" : "none";
}
function clearRecordForm(){
  ["f-url","f-title","f-creator","f-memo"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("f-ep").value = 1;
  curRating = 0; renderStars();
  recPhotos.reset([]);
  urlMeta = {url: null, thumb: null};
  document.getElementById("f-url-hint").textContent = T("url_hint");
}
function startEditRecord(id){
  const r = DB.records.find(x => x.id === id);
  if(!r) return;
  editingId = id;
  curKind = KIND_KEYS.includes(r.kind) ? r.kind : "etc";
  renderKindChips(); applyKindForm();
  document.getElementById("f-title").value = r.title || "";
  document.getElementById("f-creator").value = r.creator || "";
  document.getElementById("f-url").value = r.url || "";
  // URL을 안 바꾸고 저장하면 기존 썸네일 유지
  urlMeta = {url: r.url || null, thumb: r.thumbnail || null};
  const ep = parseInt(r.detail, 10);
  document.getElementById("f-ep").value = isNaN(ep) ? 1 : ep;
  if(r.date) document.getElementById("f-date").value = r.date;
  curRating = r.rating || 0; renderStars();
  document.getElementById("f-memo").value = r.memo || "";
  recPhotos.reset(r.photos || []);
  setEditMode(true);
  document.querySelector("main").scrollTo({top: 0, behavior: "smooth"});
  toast(T("toast_editing"));
}
document.getElementById("f-cancel-edit").addEventListener("click", () => {
  editingId = null; setEditMode(false); clearRecordForm();
});

let urlFetchTimer = null;
let urlMeta = {url: null, thumb: null}; // 마지막으로 가져온 일반 URL의 대표 이미지
document.getElementById("f-url").addEventListener("input", e => {
  const url = e.target.value.trim();
  clearTimeout(urlFetchTimer);
  const isYt = !!ytVideoId(url);
  if(!isYt && !/^https?:\/\/\S+\.\S+/i.test(url)) return;
  urlFetchTimer = setTimeout(async () => {
    const hint = document.getElementById("f-url-hint");
    if(isYt){
      hint.textContent = T("url_fetching_video");
      const meta = await tryFetchYtTitle(url);
      if(meta){
        if(!document.getElementById("f-title").value) document.getElementById("f-title").value = meta.title;
        if(!document.getElementById("f-creator").value) document.getElementById("f-creator").value = meta.channel;
        hint.textContent = T("url_filled_video");
      }else{
        hint.textContent = T("url_fail_video");
      }
      return;
    }
    hint.textContent = T("url_fetching_meta");
    const meta = await tryFetchPageMeta(url);
    let thumb = meta && meta.thumb ? meta.thumb : null;
    if(thumb && !(await _imgLoads(thumb))) thumb = null;
    if(meta && (thumb || meta.title)){
      urlMeta = {url, thumb};
      if(meta.title && !document.getElementById("f-title").value)
        document.getElementById("f-title").value = meta.title;
      hint.textContent = thumb ? T("url_found_thumb") : T("url_no_thumb");
    }else{
      urlMeta = {url: null, thumb: null};
      hint.textContent = T("url_fail_meta");
    }
  }, 600);
});

document.getElementById("f-save").addEventListener("click", async () => {
  const title = document.getElementById("f-title").value.trim();
  const url = document.getElementById("f-url").value.trim();
  if(curKind === "youtube" && !title && !url){ alert(T("alert_need_url_title")); return; }
  if(curKind !== "youtube" && !title){ alert(T("alert_need_title")); return; }

  const photoIds = await recPhotos.commit();
  const fields = {
    kind: curKind,
    title: title || T("no_title"),
    creator: document.getElementById("f-creator").value.trim() || null,
    detail: curKind === "drama" ? TF("ep_fmt", {n: document.getElementById("f-ep").value}) : null,
    url: url || null,
    thumbnail: curKind === "youtube" ? ytThumb(url)
      : (url && urlMeta.url === url ? urlMeta.thumb : null),
    rating: curRating || null,
    date: document.getElementById("f-date").value || todayStr(),
    memo: document.getElementById("f-memo").value.trim() || null,
    photos: photoIds,
  };
  if(editingId){
    const i = DB.records.findIndex(r => r.id === editingId);
    if(i >= 0){
      imgDel((DB.records[i].photos || []).filter(pid => !photoIds.includes(pid)));
      DB.records[i] = Object.assign({}, DB.records[i], fields);
    }
    editingId = null; setEditMode(false);
    toast(T("toast_edited"));
  }else{
    DB.records.push(Object.assign({
      id: Date.now() + "-" + Math.random().toString(36).slice(2, 7),
      createdAt: Date.now(),
    }, fields));
    toast(T("toast_saved"));
  }
  save();
  clearRecordForm();
  renderRecordList();
});

function recordCardHTML(r, deletable){
  const star = r.rating ? ` <span class="rec-star">${STAR(r.rating)}</span>` : "";
  const detail = r.detail ? " " + esc(r.detail) : "";
  const sub = [r.creator, T("rec_prefix") + r.date].filter(Boolean).map(esc).join(" · ");
  const thumb = r.thumbnail ? `<div class="rec-thumb"><img src="${esc(r.thumbnail)}" loading="lazy" alt="" onerror="this.closest('.rec-thumb').style.display='none'"></div>` : "";
  const link = r.url ? `<a href="${esc(r.url)}" target="_blank" rel="noopener">${T("act_open")}</a>` : "";
  const edit = deletable ? `<button data-edit="${esc(r.id)}">${T("act_edit")}</button>` : "";
  const del = deletable ? `<button class="del" data-del="${esc(r.id)}">${T("act_del")}</button>` : "";
  return `<div class="card rec-card">
    ${thumb}
    <div class="rec-body">
      <div class="rec-kind">${esc(kindLabel(r.kind))}</div>
      <div class="rec-title">${esc(r.title)}${detail}${star}</div>
      <div class="rec-sub">${sub}</div>
      ${r.memo ? `<div class="rec-memo">${esc(r.memo)}</div>` : ""}
      ${(r.photos && r.photos.length) ? `<div class="rec-photos">${r.photos.map(id => `<img data-pid="${esc(id)}" alt="">`).join("")}</div>` : ""}
      ${(link || edit || del) ? `<div class="rec-actions">${link}${edit}${del}</div>` : ""}
    </div>
  </div>`;
}
function renderRecordList(){
  const rows = DB.records
    .filter(r => curFilter === "all" || r.kind === curFilter)
    .sort((a,b) => b.date.localeCompare(a.date) || b.createdAt - a.createdAt);
  const el = document.getElementById("record-list");
  el.innerHTML = rows.length
    ? rows.map(r => recordCardHTML(r, true)).join("")
    : `<div class="empty">${T("empty_records")}</div>`;
  hydratePhotos(el);
}
document.getElementById("record-list").addEventListener("click", e => {
  const eid = e.target.dataset && e.target.dataset.edit;
  if(eid){ startEditRecord(eid); return; }
  const id = e.target.dataset && e.target.dataset.del;
  if(id && confirm(T("confirm_del_record"))){
    const rec = DB.records.find(r => r.id === id);
    if(rec && rec.photos) imgDel(rec.photos);
    DB.records = DB.records.filter(r => r.id !== id);
    save(); renderRecordList();
  }
});

/* ===================== UI: 검색 ===================== */
function runSearch(){
  const q = document.getElementById("s-q").value.trim();
  const exp = document.getElementById("s-explain");
  const out = document.getElementById("s-results");
  if(!q){ exp.textContent = ""; out.innerHTML = ""; return; }
  const p = parseQuery(q);
  exp.textContent = p.explain.length
    ? T("s_understood") + p.explain.join(" · ")
    : T("s_no_parse");

  let recRows = [], diaryRows = [];
  if(p.kind === "diary"){
    diaryRows = searchDiaries(p);
  }else{
    recRows = searchRecords(p);
    if(!p.kind && !p.rating) diaryRows = searchDiaries(p);
  }
  const total = recRows.length + diaryRows.length;
  let html = `<h3>${TF("s_results", {n: total})}</h3>`;
  if(total === 0){
    html += `<div class="empty">${T("s_none")}</div>`;
  }else{
    html += recRows.map(r => recordCardHTML(r, false)).join("");
    html += diaryRows.map(([ds, d]) => `<div class="card">
      <div class="rec-kind">${T("kind_diary")}</div>
      <div class="rec-title">${ds} (${weekdayOf(ds)})</div>
      <div class="rec-memo">${esc(d.content)}</div>
    </div>`).join("");
  }
  out.innerHTML = html;
  hydratePhotos(out);
}
document.getElementById("s-go").addEventListener("click", runSearch);

document.getElementById("exp-btn").addEventListener("click", async () => {
  // 사진까지 포함해서 내보내기
  const ids = new Set();
  DB.records.forEach(r => (r.photos || []).forEach(i => ids.add(i)));
  Object.values(DB.diary).forEach(d => (d.photos || []).forEach(i => ids.add(i)));
  DB.exchange.forEach(x => (x.photos || []).forEach(i => ids.add(i)));
  const photos = {};
  for(const id of ids){
    const b = await imgGet(id);
    if(b) photos[id] = await blobToDataURL(b);
  }
  const payload = JSON.stringify({version:2, exportedAt:new Date().toISOString(), records:DB.records, diary:DB.diary, exchange:DB.exchange, photos}, null, 2);
  const blob = new Blob([payload], {type:"application/json"});
  const fname = `${T("backup_fname")}-${todayStr()}.json`;
  const file = new File([blob], fname, {type:"application/json"});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file], title:fname}).catch(()=>{});
  }else{
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = fname; a.click();
    URL.revokeObjectURL(a.href);
  }
});

document.getElementById("imp-btn").addEventListener("click", () => document.getElementById("imp-file").click());
document.getElementById("imp-file").addEventListener("change", async e => {
  const f = e.target.files[0];
  if(!f) return;
  try{
    const data = JSON.parse(await f.text());
    if(data.type === "dailylog-exchange" && Array.isArray(data.entries)){
      // 교환일기 파일을 설정의 가져오기로 골라도 알아서 합쳐준다
      await importPhotoMap(data.photos);
      const added = mergeExchange(data.entries);
      save(); renderExchangeList(); closeSheet();
      toast(added ? TF("toast_x_received", {n: added}) : T("toast_x_none"));
      e.target.value = "";
      return;
    }
    if(!Array.isArray(data.records) || typeof data.diary !== "object") throw new Error(T("err_format"));
    const merge = confirm(T("confirm_import"));
    if(!merge) await imgClear();
    if(data.photos){
      for(const [pid, durl] of Object.entries(data.photos)){
        await imgPut(pid, dataURLToBlob(durl));
      }
    }
    if(merge){
      const sig = r => [r.kind, r.title, r.date, r.memo||""].join("|");
      const seen = new Set(DB.records.map(sig));
      let added = 0;
      for(const r of data.records){
        if(!seen.has(sig(r))){
          if(!r.id) r.id = Date.now() + "-" + Math.random().toString(36).slice(2,7);
          if(!r.createdAt) r.createdAt = Date.now();
          DB.records.push(r); seen.add(sig(r)); added++;
        }
      }
      for(const [ds, d] of Object.entries(data.diary)){
        if(!DB.diary[ds] || (d.updatedAt||0) > (DB.diary[ds].updatedAt||0)) DB.diary[ds] = d;
      }
      mergeExchange(data.exchange);
      toast(TF("toast_merged", {n: added}));
    }else{
      DB = {records:data.records, diary:data.diary,
        exchange: Array.isArray(data.exchange) ? data.exchange : []};
      alert(TF("alert_replaced", {n: data.records.length, m: Object.keys(data.diary).length}));
    }
    save(); renderRecordList(); renderDiaryList(); loadDiaryForm(); renderExchangeList();
    closeSheet();
  }catch(err){
    alert(T("err_import") + err.message);
  }
  e.target.value = "";
});

/* ===================== 교환일기 (이스터 에그) ===================== */
/* 풋터(탭바 아래 문구)를 3번 연속 탭하면 교환 탭이 열리고, 다시 3번 탭하면 숨겨진다 */
const X_UNLOCK_KEY = "dailylog_exchange_open";
const X_NAME_KEY = "dailylog_exchange_name";
function exchangeUnlocked(){ return localStorage.getItem(X_UNLOCK_KEY) === "1"; }
function showExchangeTab(){
  document.getElementById("tab-exchange").style.display = exchangeUnlocked() ? "" : "none";
}
{
  let taps = 0, tapTimer = null;
  document.getElementById("app-footer").addEventListener("click", () => {
    taps++;
    clearTimeout(tapTimer);
    tapTimer = setTimeout(() => { taps = 0; }, 1200);
    if(taps >= 3){
      taps = 0;
      const open = !exchangeUnlocked();
      localStorage.setItem(X_UNLOCK_KEY, open ? "1" : "0");
      showExchangeTab();
      if(open){
        toast(T("toast_x_open"));
      }else{
        // 교환 탭을 보고 있었다면 기록 탭으로 돌아간다 (일기는 그대로 보관됨)
        if(document.getElementById("sec-exchange").classList.contains("on")){
          document.querySelector('nav button[data-tab="records"]').click();
        }
        toast(T("toast_x_hidden"));
      }
    }
  });
}
function newXId(){ return "x" + Date.now() + "-" + Math.random().toString(36).slice(2, 7); }
function renderExchangeList(){
  const wrap = document.getElementById("x-list");
  wrap.innerHTML = "";
  const list = DB.exchange.slice().sort((a, b) =>
    (b.date || "").localeCompare(a.date || "") || (b.createdAt || 0) - (a.createdAt || 0));
  if(!list.length){
    wrap.innerHTML = `<div class="empty">${T("empty_x")}</div>`;
    return;
  }
  for(const en of list){
    const d = document.createElement("details"); d.className = "diary-item";
    const s = document.createElement("summary");
    s.textContent = `${en.date || "?"} · ${en.author || T("anon")}`;
    const b = document.createElement("div"); b.className = "diary-body";
    const txt = document.createElement("div"); txt.textContent = en.content || "";
    b.appendChild(txt);
    if(en.photos && en.photos.length){
      const ph = document.createElement("div"); ph.className = "rec-photos";
      ph.innerHTML = en.photos.map(id => `<img data-pid="${esc(id)}" alt="">`).join("");
      b.appendChild(ph);
    }
    const del = document.createElement("button");
    del.textContent = "삭제";
    del.style.cssText = "margin-top:10px;background:none;border:none;color:var(--danger);font-size:13px;font-weight:600;padding:0";
    del.addEventListener("click", () => {
      if(!confirm(T("confirm_del_x"))) return;
      imgDel(en.photos || []);
      DB.exchange = DB.exchange.filter(x => x.id !== en.id);
      save(); renderExchangeList();
    });
    b.appendChild(del);
    d.appendChild(s); d.appendChild(b); wrap.appendChild(d);
  }
  hydratePhotos(wrap);
}
/* 받은 파일에 담겨 온 사진(dataURL)을 사진 저장소에 넣는다 */
async function importPhotoMap(photos){
  for(const [pid, durl] of Object.entries(photos || {})){
    await imgPut(pid, dataURLToBlob(durl));
  }
}
function mergeExchange(entries){
  const have = new Set(DB.exchange.map(x => x.id));
  let added = 0;
  for(const en of entries || []){
    if(!en || typeof en.content !== "string") continue;
    if(!en.id) en.id = newXId();
    if(!have.has(en.id)){ DB.exchange.push(en); have.add(en.id); added++; }
  }
  return added;
}
document.getElementById("x-save").addEventListener("click", async () => {
  const author = document.getElementById("x-author").value.trim();
  const content = document.getElementById("x-content").value.trim();
  if(!content){ alert(T("alert_need_content")); return; }
  if(author) localStorage.setItem(X_NAME_KEY, author);
  const photoIds = await xPhotos.commit();
  DB.exchange.push({
    id: newXId(),
    author: author || T("anon"),
    date: document.getElementById("x-date").value || todayStr(),
    content,
    photos: photoIds,
    createdAt: Date.now(),
  });
  save();
  document.getElementById("x-content").value = "";
  xPhotos.reset([]);
  renderExchangeList();
  toast(T("toast_x_saved"));
});
document.getElementById("x-share").addEventListener("click", async () => {
  if(!DB.exchange.length){ alert(T("alert_x_empty")); return; }
  // 사진도 dataURL로 담아서 함께 보낸다
  const photos = {};
  for(const en of DB.exchange){
    for(const pid of en.photos || []){
      const b = await imgGet(pid);
      if(b) photos[pid] = await blobToDataURL(b);
    }
  }
  const payload = JSON.stringify({type:"dailylog-exchange", version:1,
    exportedAt:new Date().toISOString(), entries:DB.exchange, photos}, null, 2);
  const fname = `${T("x_fname")}-${todayStr()}.json`;
  const file = new File([new Blob([payload], {type:"application/json"})], fname, {type:"application/json"});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file], title:fname}).catch(()=>{});
  }else{
    const a = document.createElement("a");
    a.href = URL.createObjectURL(file); a.download = fname; a.click();
    URL.revokeObjectURL(a.href);
  }
});
document.getElementById("x-import").addEventListener("click", () => document.getElementById("x-file").click());
document.getElementById("x-file").addEventListener("change", async e => {
  const f = e.target.files[0];
  if(!f) return;
  try{
    const data = JSON.parse(await f.text());
    if(data.type !== "dailylog-exchange" || !Array.isArray(data.entries)) throw new Error(T("err_x_file"));
    await importPhotoMap(data.photos);
    const added = mergeExchange(data.entries);
    save(); renderExchangeList();
    toast(added ? TF("toast_x_received", {n: added}) : T("toast_x_none"));
  }catch(err){
    alert(T("err_import") + err.message);
  }
  e.target.value = "";
});

/* ===================== 초기화 ===================== */
document.getElementById("f-date").value = todayStr();
document.getElementById("d-date").value = todayStr();
document.getElementById("x-date").value = todayStr();
document.getElementById("x-author").value = localStorage.getItem(X_NAME_KEY) || "";
renderStars(); loadDiaryForm(); showExchangeTab(); syncThemeColorMeta();
applyLang();  // 모든 문구·칩·목록을 현재 언어로 렌더링

if("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost")){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
</script>
